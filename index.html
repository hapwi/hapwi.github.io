<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <!-- flowbite css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet"/>
    <!-- boostrap icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- custom css -->
    <link rel="stylesheet" href="./styles/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
          .rounded-lg {
    border-radius: 15px;
}
    </style>
   
</head>
<body class="bg-gray-900 text-white">
  <!-- ? start of header -->
  <div id="header-placeholder" class="fixed top-0 left-0 right-0 z-50 mx-auto my-8 px-4 sm:px-0">
    <div class="relative shadow-md w-1/2 max-w-sm mx-auto">
      <div class="overflow-x-auto rounded-full bg-gray-700 text-white uppercase text-sm text-center rtl:text-right text-gray-500 dark:text-gray-400">
        <h1 class="px-4 py-2">Leaderboard</h1>
      </div>
    </div>
  </div>
<!-- ? start of table -->
  <div class="max-w-7xl mx-auto my-10 px-4 sm:px-0">
    <div class="relative shadow-md">
        <div class="overflow-x-auto rounded-lg">
            <table class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400 divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
          <tr class="divide-x divide-gray-200 dark:divide-gray-700">
            <th scope="col" class="px-6 py-3">User</th>
            <th scope="col" class="px-6 py-3 text-right">Score</th> <!-- Add 'text-right' here -->
          </tr>
        </thead>
        <tbody id="table-body" class="bg-white uppercase border-b dark:bg-gray-800 dark:border-gray-700 divide-y divide-gray-200 dark:divide-gray-700">
            <!-- Data rows will be inserted here -->
        </tbody>
    </table>
        </table>
    </div>
</div>
<!-- ? bottom nav -->
<div id="bottom-nav-placeholder"></div>


<!-- flowbite js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.js"></script>
<script>
    const apiKey = 'AIzaSyCTIOtXB0RDa5Y5gubbRn328WIrqHwemrc';
    const spreadsheetId = '1iTNStqnadp4ZyR7MRkSmvX5WeialS4WST6Yy-Qv8Reo'; //? leaderboard api
    const spreadsheetId2 = '1_bP0NUG6XqrF0XQvKXNm3b07QuHABfvWotsemGToyYg'; //? entires api
    const spreadsheetId3 = '1zCKMy2jgG9QoIhxFqRviDm4oxEFK_ixv_tN66GmCXTc'; //? players api

    async function fetchGoogleSheetsData3() {
      try {
        const response = await fetch(
          `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId3}/values/A2:B?key=${apiKey}`
        );
        const data = await response.json();

        if (data.error) {
          throw new Error(data.error.message);
        }

        return data;
      } catch (error) {
        console.error('Error fetching Google Sheets data:', error);
      }
    }

    async function fetchGoogleSheetsData2() {
    try {
        const response = await fetch(
            `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId2}/values/A2:G?key=${apiKey}`
        );
        const data = await response.json();

        if (data.error) {
            throw new Error(data.error.message);
        }

        return data;
    } catch (error) {
        console.error('Error fetching Google Sheets data:', error);
    }
}

    async function fetchGoogleSheetsData() {
      try {
        const response = await fetch(
          `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Copy%20of%20Leaderboard!A1:Z?key=${apiKey}`
        );
        const data = await response.json();

        if (data.error) {
          throw new Error(data.error.message);
        }

        const data2 = await fetchGoogleSheetsData2();
        const userGolfersMap = new Map();
        data2.values.forEach((row) => { // Removed index from here

          const user = row[0];
          const golfers = row.slice(1, 7); // Get golfers 1-6

          if (userGolfersMap.has(user)) {
            // If the user already exists in the map, append the golfers to the existing list
            userGolfersMap.set(user, [...userGolfersMap.get(user), ...golfers]);
          } else {
            // If the user doesn't exist in the map, add them with their golfers
            userGolfersMap.set(user, golfers);
          }
        });

        const data3 = await fetchGoogleSheetsData3();
        const golferScoresMap = new Map();
        data3.values.forEach(row => {
          golferScoresMap.set(row[0], row[1]); // Store golfer scores
        });

        displayTable(data, userGolfersMap, golferScoresMap);
      } catch (error) {
        console.error('Error fetching Google Sheets data:', error);
      }
    }

    function displayTable(data, userGolfersMap, golferScoresMap) {
      const tableBody = document.getElementById('table-body');
      tableBody.innerHTML = '';

      data.values.forEach((row, index) => {
        if (index === 0) return; // Skip header row if present

        const golfers = userGolfersMap.get(row[0]) || []; // Get golfers for the user

        // Main row with arrow icon in the last cell
        const mainRow = document.createElement('tr');
        mainRow.className = "accordion-toggle divide-gray-200 dark:divide-gray-700";
        mainRow.innerHTML = `
          <td class="px-6 py-4">${row[0]}</td>
          <td class="px-6 py-4 text-right">
            ${row[1]}
            <i class="arrow bi bi-chevron-down" style="float: right; cursor: pointer;"></i>
          </td>
        `;
        tableBody.appendChild(mainRow);

        // Additional data row (hidden by default)
        const additionalDataRow = document.createElement('tr');
        additionalDataRow.className = "accordion-content hidden";
        additionalDataRow.innerHTML = `
          <td colspan="2">
            <div class="golfer-container">
              ${golfers.map(golfer => {
                const score = golferScoresMap.get(golfer) || 'N/A'; // Get score for the golfer
                return `<div class="golfer-item">${golfer}: <span class="golfer-score">${score}</span></div>`;
              }).join('')}
            </div>
          </td>
        `;
        tableBody.appendChild(additionalDataRow);
      });

      // Add event listeners for accordion toggle
      document.querySelectorAll('.accordion-toggle').forEach(item => {
        item.addEventListener('click', () => {
          const accordionContent = item.nextElementSibling;
          accordionContent.classList.toggle('hidden');

          const arrowIcon = item.querySelector('.arrow');
          arrowIcon.classList.toggle('rotated');
        });
      });
    }

    fetchGoogleSheetsData(); // Fetch data on page load

    

</script>
 <script src="./js/nav.js"></script>


</body>
</html>
