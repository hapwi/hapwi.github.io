<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Leaderboard Table</title>
    <!-- flowbite css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet"/>

    <!-- boostrap icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

      .active-button {
        background-color: #111827;
        color: #1F2937;
      }

      .bottom-icons {
        color: #8b8b8b; /* Bootstrap's gray color, adjust as needed */
    }

    body {
        padding-bottom: 60px; /* Adjust this value based on the height of your navbar */
    }

    </style>
</head>
<body class="bg-gray-900 text-white">

<!-- ? start of table -->
  <div class="max-w-2xl mx-auto my-10 px-4 sm:px-0">
    <div class="relative shadow-md">
        <div class="overflow-x-auto rounded-lg">
            <table class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400 divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
          <tr class="divide-x divide-gray-200 dark:divide-gray-700">
            <th scope="col" class="px-6 py-3">User</th>
            <th scope="col" class="px-6 py-3 text-right">Score</th> <!-- Add 'text-right' here -->
          </tr>
        </thead>
        <tbody id="table-body" class="bg-white uppercase border-b dark:bg-gray-800 dark:border-gray-700 divide-y divide-gray-200 dark:divide-gray-700">
            <!-- Data rows will be inserted here -->
        </tbody>
    </table>
        </table>
    </div>
</div>

<!-- ? bottom nav -->
<div class="fixed z-50 w-full h-16 max-w-lg -translate-x-1/2 bg-white border border-gray-200 rounded-full bottom-4 left-1/2 dark:bg-gray-700 dark:border-gray-600">
  <div class="grid h-full max-w-lg grid-cols-4 mx-auto">
      <button id="btn-leaderboard" data-href="" data-tooltip-target="tooltip-home" type="button" class="inline-flex flex-col items-center justify-center px-5 rounded-s-full hover:bg-gray-50 dark:hover:bg-gray-800 group navigation-button">
        <i class="bi bi-trophy-fill w-5 h-5 mb-1 bottom-icons"></i>
        <span class="sr-only">Leaderboard</span>
      </button>
      <div id="tooltip-home" role="tooltip" class="absolute z-10 invisible inline-block px-3 py-2 text-sm font-medium text-white transition-opacity duration-300 bg-gray-900 rounded-lg shadow-sm opacity-0 tooltip dark:bg-gray-700">
          Leaderboard
          <div class="tooltip-arrow" data-popper-arrow></div>
      </div>
      <button id="btn-players" data-href="" data-tooltip-target="tooltip-wallet" type="button" class="inline-flex flex-col items-center justify-center px-5 hover:bg-gray-50 dark:hover:bg-gray-800 group navigation-button">
        <i class="bi bi-person-circle w-5 h-5 mb-1 bottom-icons"></i>
        <span class="sr-only">Players</span>
      </button>
      <div id="tooltip-wallet" role="tooltip" class="absolute z-10 invisible inline-block px-3 py-2 text-sm font-medium text-white transition-opacity duration-300 bg-gray-900 rounded-lg shadow-sm opacity-0 tooltip dark:bg-gray-700">
          Players
          <div class="tooltip-arrow" data-popper-arrow></div>
      </div>
      <button id="btn-entries" data-href="" data-tooltip-target="tooltip-settings" type="button" class="inline-flex flex-col items-center justify-center px-5 hover:bg-gray-50 dark:hover:bg-gray-800 group navigation-button">
        <i class="bi bi-list-task w-5 h-5 mb-1 bottom-icons"></i>
        <span class="sr-only">Entries</span>
      </button>
      <div id="tooltip-settings" role="tooltip" class="absolute z-10 invisible inline-block px-3 py-2 text-sm font-medium text-white transition-opacity duration-300 bg-gray-900 rounded-lg shadow-sm opacity-0 tooltip dark:bg-gray-700">
          Entries
          <div class="tooltip-arrow" data-popper-arrow></div>
      </div>
      <button id="btn-form" data-href="" data-tooltip-target="tooltip-profile" type="button" class="inline-flex flex-col items-center justify-center px-5 rounded-e-full hover:bg-gray-50 dark:hover:bg-gray-800 group navigation-button">
        <i class="bi bi-pencil-square w-5 h-5 mb-1 bottom-icons"></i>
        <span class="sr-only">Form</span>
      </button>
      <div id="tooltip-profile" role="tooltip" class="absolute z-10 invisible inline-block px-3 py-2 text-sm font-medium text-white transition-opacity duration-300 bg-gray-900 rounded-lg shadow-sm opacity-0 tooltip dark:bg-gray-700">
          Form
          <div class="tooltip-arrow" data-popper-arrow></div>
      </div>
  </div>
</div>

<!-- flowbite js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.js"></script>
<script>
    const apiKey = 'AIzaSyCTIOtXB0RDa5Y5gubbRn328WIrqHwemrc';
    const spreadsheetId = '1iTNStqnadp4ZyR7MRkSmvX5WeialS4WST6Yy-Qv8Reo';

    async function fetchGoogleSheetsData() {
        try {
            const response = await fetch(
                `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Copy%20of%20Leaderboard!A1:Z?key=${apiKey}`
            );
            const data = await response.json();

            if (data.error) {
                throw new Error(data.error.message);
            }

            displayTable(data);
        } catch (error) {
            console.error('Error fetching Google Sheets data:', error);
        }
    }

    function displayTable(data) {
      const tableBody = document.getElementById('table-body');
      tableBody.innerHTML = '';

      data.values.forEach((row, index) => {
        if (index === 0) return; // Skip header row if present

        const tr = document.createElement('tr');
        tr.className = "divide-x divide-gray-200 dark:divide-gray-700";
        tr.innerHTML = `
          <td class="px-6 py-4">${row[0]}</td>
          <td class="px-6 py-4 text-right">${row[1]}</td> <!-- Add 'text-right' here -->
        `;
        tableBody.appendChild(tr);
      });
    }

    fetchGoogleSheetsData(); // Fetch data on page load

    // highlight active pages
    document.addEventListener("DOMContentLoaded", function() {
    // Define your page-button mappings
    const pageButtonMap = {
        "/index.html": "btn-leaderboard",
        "/players.html": "btn-players",
        "/entries.html": "btn-entries",
        "/form.html": "btn-form"
    };

    // Get the current pathname
    const currentPage = window.location.pathname;

    // Find the corresponding button for the current page
    const activeButtonId = pageButtonMap[currentPage];
    if (activeButtonId) {
        document.getElementById(activeButtonId).classList.add("active-button");
    }

    // Attach click event listeners to buttons for navigation
    document.querySelectorAll('.navigation-button').forEach(button => {
    button.addEventListener('click', function() {
        window.location.href = this.getAttribute('data-href');
    });
});
console.log("Current page:", currentPage);
console.log("Active Button ID:", activeButtonId);

});

</script>
</body>
</html>
