<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Players</title>
    <!-- flowbite css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet"/>
    <!-- boostrap icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- custom css -->
    <link rel="stylesheet" href="./styles/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
            .rounded-lg {
    border-radius: 30px;
}
    </style>
</head>

<body class="bg-gray-900 text-white">
    <!-- ? start of header -->
    <div id="header-placeholder" class="fixed top-0 left-0 right-0 z-50 mx-auto my-8 px-4 sm:px-0">
      <div class="relative shadow-md w-1/2 max-w-sm mx-auto">
        <div class="overflow-x-auto rounded-full bg-gray-700 text-white uppercase text-sm text-center rtl:text-right text-gray-500 dark:text-gray-400">
          <h1 class="px-4 py-2">Players</h1>
        </div>
      </div>
    </div>
    <!-- ?start of table -->
<div class="max-w-7xl mx-auto my-10 px-4 sm:px-0">
    <div class="relative shadow-md">
        <div class="overflow-x-auto rounded-lg">
            <table class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400 divide-y divide-gray-200 dark:divide-gray-700">
                <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
                    <tr class="divide-x divide-gray-200 dark:divide-gray-700">
                        <th scope="col" class="px-6 py-3">Player</th>
                        <th scope="col" class="px-6 py-3 text-right">Score</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="bg-white uppercase border-b dark:bg-gray-800 dark:border-gray-700 divide-y divide-gray-200 dark:divide-gray-700">
                    <!-- Data rows will be inserted here -->
                </tbody>
            </table>
        </div>
    </div>
</div>
    
    <!-- ? bottom nav -->
    <div id="bottom-nav-placeholder"></div>
    <!-- ? flowbite js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.js"></script>
    <script>
const apiKey = 'AIzaSyCTIOtXB0RDa5Y5gubbRn328WIrqHwemrc';
const spreadsheetId = '1zCKMy2jgG9QoIhxFqRviDm4oxEFK_ixv_tN66GmCXTc';

async function fetchGoogleSheetsData() {
  try {
    const response = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Sheet1!A2:B?key=${apiKey}`);
    const data = await response.json();

    if (data.error) {
      throw new Error(data.error.message);
    }

    displayTable(data);
  } catch (error) {
    console.error('Error fetching Google Sheets data:', error);
  }
}

function displayTable(data) {
  const tableBody = document.getElementById('table-body');
  tableBody.innerHTML = '';

  data.values.forEach((row) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="px-6 py-4">${row[0]}</td>
      <td class="px-6 py-4 text-right">${row[1]}</td>
    `;
    tableBody.appendChild(tr);
  });
}

fetchGoogleSheetsData();

    </script>
    <script src="./js/nav.js"></script>

</body>
</html>
